services:
  panel:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/app.db
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: /data/uploads
      SESSION_SECRET: change-me
      CONTROL_PASSCODE: let-me-in
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./data:/data
    command: sh -c "pnpm db:deploy && pnpm start"
